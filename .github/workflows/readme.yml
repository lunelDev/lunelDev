# .github/workflows/readme-autoupdater.yml
name: 🛠 Readme AutoUpdater

on:
  workflow_dispatch: # 👉 Actions 탭에서 “Run workflow” 버튼으로 수동 실행
  schedule:
    - cron: "0 * * * *" # ⏰ 선택: 매 정시 0분에 자동 실행 (원하면 남겨두고, 완전 수동만 원하면 삭제)

permissions:
  contents: write # README 수정 & 푸시 권한

concurrency:
  group: readme-update # 중복 실행 방지
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm install rss-parser@^3

      - name: Run readmeUpdate.cjs
        run: node readmeUpdate.cjs

      - name: Commit & push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md
          if git diff --cached --quiet; then
            echo "✔️ README 변경 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "📝 자동 README 업데이트"
          git push

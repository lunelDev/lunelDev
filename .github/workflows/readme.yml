name: 🛠 Readme AutoUpdater (v2)  # ← 기존 이름과 다르게 바꾸기

on:
  schedule:
    - cron: "0 * * * *"     # ⏰ 매 정시 0분에 실행
  workflow_dispatch:

permissions:
  contents: write

concurrency:               # ← 중복 실행 방지
  group: readme-update
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install rss-parser@^3

      - name: Run readmeUpdate.cjs
        run: node readmeUpdate.cjs

      - name: Commit & push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git add README.md
          if git diff --cached --quiet; then
            echo "✔️ README 변경 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "📝 자동 README 업데이트"
          git push
